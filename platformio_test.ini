[env:test_rollover]
extends = env:esp8266
build_flags = 
    ${env:esp8266.build_flags}
    -D TEST_ROLLOVER
    -D ENABLE_CRASH_LOG
    -D LOG_MSG_BUFFER
upload_port = COM3  ; Change to your port

; Test-specific settings
monitor_speed = 115200
monitor_filters = 
    esp8266_exception_decoder
    time
    log2file

; Add test monitoring
board_build.f_cpu = 80000000L
board_build.f_flash = 40000000L